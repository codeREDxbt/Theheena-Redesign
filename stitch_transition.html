<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Editorial Split Transition Screen</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&amp;family=DM+Sans:wght@400;700&amp;family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#c3612c", // Terracotta-ish match
              "ivory": "#F5F0E8",
              "charcoal": "#1A1A1A",
              "terracotta": "#C4622D",
              "background-light": "#f8f7f6",
              "background-dark": "#1f1713",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"],
              "serif": ["Cormorant Garamond", "serif"],
              "sans": ["DM Sans", "sans-serif"],
            },
            borderRadius: {
              "DEFAULT": "0.125rem",
              "lg": "0.25rem",
              "xl": "0.5rem",
              "full": "0.75rem"
            },
          },
        },
      }
    </script>
<style>
        /* Custom clipping for the split text effect */
        .split-text-container {
            position: relative;
            display: inline-block;
        }
        
        .split-text-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* The left half of the H (on ivory bg) should be charcoal */
        .layer-left {
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
            color: #1A1A1A; /* charcoal */
            z-index: 2;
        }
        
        /* The right half of the H (on charcoal bg) should be ivory */
        .layer-right {
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
            color: #F5F0E8; /* ivory */
            z-index: 2;
        }

        /* Base layer just in case, though clipped layers cover it */
        .base-text {
            visibility: hidden; 
        }
    </style>
</head>
<body class="font-display antialiased">
<div class="relative flex h-screen w-full overflow-hidden">
<!-- Left Split Background -->
<div class="absolute inset-y-0 left-0 w-1/2 bg-ivory z-0"></div>
<!-- Right Split Background -->
<div class="absolute inset-y-0 right-0 w-1/2 bg-charcoal z-0"></div>
<!-- Center Content -->
<div class="relative z-10 flex h-full w-full flex-col items-center justify-center">
<!-- The Split 'H' Initial -->
<div class="mb-6 select-none">
<div class="split-text-container text-[120px] leading-none font-bold font-serif">
<!-- This invisible base sets the size -->
<span class="base-text">H</span>
<!-- Left half: Charcoal color -->
<div class="split-text-layer layer-left">H</div>
<!-- Right half: Ivory color -->
<div class="split-text-layer layer-right">H</div>
</div>
</div>
<!-- Subheading -->
<h2 class="text-terracotta font-sans text-[12px] font-bold tracking-[0.2em] uppercase text-center">
            The Image Revolution
        </h2>
</div>
<!-- Loading Indicator - Bottom Right -->
<div class="absolute bottom-8 right-8 z-20">
<p class="text-ivory font-sans text-[10px] font-normal tracking-wide opacity-80">Loading...</p>
</div>
</div>
</body></html>
